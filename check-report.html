<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HOME PPK">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" type="image/png" href="icons/icon-192.png">
    <title>ตรวจรายงาน | HOME PPK 2026</title>
    <link rel="stylesheet" href="ppk-theme.css?v=20260416C">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap');
    :root{--bg:#f8fafc;--surface:#ffffff;--border:#e5e7eb;--text:#0f172a;--muted:#64748b;--thead:#e2e8f0;--hover:#f1f5f9;--shadow:0 8px 24px rgba(15,23,42,.06);--primary:#2563eb;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;}
    *{box-sizing:border-box;}
    body{margin:0;min-height:100vh;font-family:'Kanit',sans-serif;background:var(--bg);color:var(--text);}
    @media(max-width:768px){.dashboard-container,.main-container{padding-bottom:2rem!important;}}
    .dashboard-container{min-height:100vh;padding:2rem;padding-left:max(1.25rem,env(safe-area-inset-left,0px));padding-right:max(1.25rem,env(safe-area-inset-right,0px));display:flex;flex-direction:column;gap:1.2rem;align-items:center;}
    @media(max-width:600px){.dashboard-container{padding:1.2rem .6rem;padding-left:max(0.85rem,env(safe-area-inset-left,0px));padding-right:max(0.85rem,env(safe-area-inset-right,0px));}}
    .page-header{width:100%;max-width:1200px;display:flex;justify-content:center;}
    .page-header h2{margin:0;font-size:2rem;font-weight:700;}
    .section{width:100%;max-width:1200px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem;box-shadow:var(--shadow);}
    .section-head{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:.9rem;flex-wrap:wrap;}
    .section-title{margin:0;font-size:1.15rem;font-weight:700;}
    .controls-row{display:flex;gap:1rem;flex-wrap:wrap;}
    .form-group{flex:1;min-width:150px;}
    .form-group label{display:block;margin-bottom:.4rem;font-size:.95rem;font-weight:700;}
    .form-group select{width:100%;padding:.7rem .9rem;border:1px solid var(--border);border-radius:10px;font:inherit;background:#fff;}
    .btn{padding:.55rem .9rem;border-radius:10px;border:1px solid var(--border);background:#fff;font:inherit;font-size:.98rem;font-weight:700;cursor:pointer;transition:all .2s;}
    .btn:hover{background:var(--hover);}
    .btn:disabled{opacity:.55;cursor:not-allowed;}
    .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);}
    .btn-primary:hover{background:#1d4ed8;}
    .btn-success{background:var(--success);color:#fff;border-color:var(--success);}
    .btn-success:hover{background:#059669;}
    .btn-danger{background:var(--danger);color:#fff;border-color:var(--danger);}
    .btn-danger:hover{background:#dc2626;}
    .btn-sm{padding:.35rem .6rem;font-size:.85rem;border-radius:8px;}
    .status-badge{display:inline-block;padding:.25rem .6rem;border-radius:20px;font-size:.85rem;font-weight:600;}
    .status-pending{background:#fef3c7;color:#92400e;}
    .status-approved{background:#d1fae5;color:#065f46;}
    .status-rejected{background:#fee2e2;color:#991b1b;}
    .card-list{display:flex;flex-direction:column;gap:0.8rem;}
    .report-card{border:1px solid var(--border);border-radius:12px;padding:1rem;transition:box-shadow .2s;}
    .report-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);}
    .report-card-header{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;}
    .report-card-info{flex:1;}
    .report-card-title{font-weight:700;font-size:1.05rem;}
    .report-card-meta{font-size:.9rem;color:var(--muted);margin-top:.2rem;}
    .report-card-actions{display:flex;gap:.5rem;flex-wrap:wrap;}
    /* Signature Canvas */
    .sig-panel{display:none;margin-top:1rem;border-top:1px solid var(--border);padding-top:1rem;}
    .sig-panel.active{display:block;}
    .preview-frame{width:100%;height:400px;border:1px solid var(--border);border-radius:10px;margin-bottom:1rem;background:#fff;}
    @media(max-width:600px){.preview-frame{height:280px;}}
    .sig-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1rem;}
    @media(max-width:768px){.sig-grid{grid-template-columns:1fr;}}
    .sig-item{text-align:center;}
    .sig-label{font-weight:700;font-size:.95rem;margin-bottom:.4rem;}
    .sig-canvas-wrap{position:relative;border:2px solid var(--border);border-radius:10px;background:#fff;overflow:hidden;}
    .sig-canvas{width:100%;height:120px;display:block;touch-action:none;cursor:crosshair;}
    .sig-clear{position:absolute;top:4px;right:4px;background:rgba(255,255,255,.9);border:1px solid #ddd;border-radius:6px;padding:2px 8px;font-size:.8rem;cursor:pointer;}
    .sig-actions{display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap;}
    .reject-input{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:10px;font:inherit;font-size:.95rem;min-height:60px;resize:vertical;margin-bottom:.8rem;}
    .reject-input:focus{outline:none;border-color:var(--danger);box-shadow:0 0 0 3px rgba(239,68,68,.12);}
    .empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:1.1rem;}
    </style>
</head>
<body>
    <div id="ppkNav"></div>
    <div class="dashboard-container main-container">
        <div class="page-header"><h2>📋 ตรวจรายงาน</h2></div>

        <!-- Filters -->
        <div class="section">
            <div class="controls-row">
                <div class="form-group" style="min-width:140px;">
                    <label>สถานะ</label>
                    <select id="filterStatus" onchange="loadApprovals()">
                        <option value="pending">⏳ รอการอนุมัติ</option>
                        <option value="approved">✅ อนุมัติแล้ว</option>
                        <option value="rejected">❌ ไม่อนุมัติ</option>
                        <option value="">ทั้งหมด</option>
                    </select>
                </div>
                <div class="form-group" style="min-width:140px;">
                    <label>ประเภท</label>
                    <select id="filterType" onchange="loadApprovals()">
                        <option value="">ทั้งหมด</option>
                        <option value="water_monthly">💧 ค่าน้ำรายเดือน</option>
                        <option value="water_yearly">💧 ค่าน้ำรายปี</option>
                        <option value="electric_monthly">⚡ ค่าไฟรายเดือน</option>
                        <option value="electric_yearly">⚡ ค่าไฟรายปี</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Report list -->
        <div class="section">
            <div class="section-head">
                <div>
                    <h3 class="section-title">รายงานที่ส่งขออนุมัติ</h3>
                </div>
                <div style="display:flex;align-items:center;gap:.6rem;">
                    <span id="reportCount" style="color:var(--muted);font-size:.9rem;"></span>
                    <button class="btn btn-sm" onclick="exportReportCSV()" title="ส่งออก CSV">⬇ CSV</button>
                </div>
            </div>
            <div id="reportList" class="card-list">
                <div class="empty-state">⏳ กำลังโหลด...</div>
            </div>
        </div>

        <!-- Review panel (hidden until click) -->
        <div class="section" id="reviewSection" style="display:none;">
            <div class="section-head">
                <h3 class="section-title" id="reviewTitle">ตรวจสอบรายงาน</h3>
                <button class="btn btn-sm" onclick="closeReview()">✕ ปิด</button>
            </div>

            <!-- Preview -->
            <iframe id="previewFrame" class="preview-frame" sandbox="allow-same-origin"></iframe>

            <!-- Signature area -->
            <div id="sigPanel" class="sig-panel active">
                <h4 style="margin:0 0 .8rem 0;">✍️ ลงนามอนุมัติ</h4>
                <div class="sig-grid">
                    <div class="sig-item">
                        <div class="sig-label">ผู้บันทึก</div>
                        <div class="sig-canvas-wrap">
                            <canvas id="sigCanvas1" class="sig-canvas"></canvas>
                            <button class="sig-clear" onclick="clearSigCanvas(1)">ล้าง</button>
                        </div>
                    </div>
                    <div class="sig-item">
                        <div class="sig-label">ผู้ตรวจสอบ</div>
                        <div class="sig-canvas-wrap">
                            <canvas id="sigCanvas2" class="sig-canvas"></canvas>
                            <button class="sig-clear" onclick="clearSigCanvas(2)">ล้าง</button>
                        </div>
                    </div>
                    <div class="sig-item">
                        <div class="sig-label">หัวหน้างาน</div>
                        <div class="sig-canvas-wrap">
                            <canvas id="sigCanvas3" class="sig-canvas"></canvas>
                            <button class="sig-clear" onclick="clearSigCanvas(3)">ล้าง</button>
                        </div>
                    </div>
                </div>

                <!-- Reject reason -->
                <div id="rejectArea" style="display:none;">
                    <textarea id="rejectNote" class="reject-input" placeholder="เหตุผลที่ไม่อนุมัติ..."></textarea>
                </div>

                <div class="sig-actions">
                    <button class="btn btn-success" onclick="approveReport()" id="btnApprove">✅ อนุมัติและส่งกลับ</button>
                    <button class="btn btn-danger" onclick="toggleReject()" id="btnReject">❌ ไม่อนุมัติ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    window._ppkNavPage = 'check-report';
    if (typeof renderPPKNav === 'function') { renderPPKNav('ppkNav', 'check-report'); }

    var currentReportId = null;
    var sigContexts = {};
    var sigDrawing = {};

    // === Signature Canvas Setup ===
    function initSigCanvases() {
        for (var i = 1; i <= 3; i++) {
            (function(idx) {
                var canvas = document.getElementById('sigCanvas' + idx);
                var rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * 2;
                canvas.height = rect.height * 2;
                var ctx = canvas.getContext('2d');
                ctx.scale(2, 2);
                ctx.strokeStyle = '#1a1a1a';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                sigContexts[idx] = ctx;
                sigDrawing[idx] = false;

                function getPos(e) {
                    var r = canvas.getBoundingClientRect();
                    var t = e.touches ? e.touches[0] : e;
                    return { x: t.clientX - r.left, y: t.clientY - r.top };
                }
                function startDraw(e) {
                    e.preventDefault();
                    sigDrawing[idx] = true;
                    var p = getPos(e);
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                }
                function draw(e) {
                    if (!sigDrawing[idx]) return;
                    e.preventDefault();
                    var p = getPos(e);
                    ctx.lineTo(p.x, p.y);
                    ctx.stroke();
                }
                function endDraw(e) {
                    sigDrawing[idx] = false;
                }
                // Pointer events (works with Apple Pencil / stylus / mouse)
                canvas.addEventListener('pointerdown', startDraw);
                canvas.addEventListener('pointermove', draw);
                canvas.addEventListener('pointerup', endDraw);
                canvas.addEventListener('pointerleave', endDraw);
                // Touch fallback
                canvas.addEventListener('touchstart', startDraw, { passive: false });
                canvas.addEventListener('touchmove', draw, { passive: false });
                canvas.addEventListener('touchend', endDraw);
            })(i);
        }
    }

    function clearSigCanvas(idx) {
        var canvas = document.getElementById('sigCanvas' + idx);
        var ctx = sigContexts[idx];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function getSigData(idx) {
        var canvas = document.getElementById('sigCanvas' + idx);
        // Check if canvas has any drawing
        var ctx = sigContexts[idx];
        var data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        var hasContent = false;
        for (var i = 3; i < data.length; i += 4) {
            if (data[i] > 0) { hasContent = true; break; }
        }
        if (!hasContent) return null;
        return canvas.toDataURL('image/png');
    }

    // Holds last-loaded report items for CSV export
    var _reportItems = [];

    // === Export CSV ===
    function exportReportCSV() {
        if (!_reportItems.length) { alert('ไม่มีข้อมูลสำหรับส่งออก'); return; }
        var typeMap = {
            'water_monthly': 'ค่าน้ำรายเดือน',
            'water_yearly': 'ค่าน้ำรายปี',
            'electric_monthly': 'ค่าไฟรายเดือน',
            'electric_yearly': 'ค่าไฟรายปี'
        };
        var statusMap = { 'approved': 'อนุมัติแล้ว', 'rejected': 'ไม่อนุมัติ', 'pending': 'รอการอนุมัติ' };
        var rows = [['ลำดับ', 'ประเภทรายงาน', 'งวด', 'สถานะ', 'ส่งเมื่อ', 'หมายเหตุผู้ตรวจ']];
        _reportItems.forEach(function(item, i) {
            var dt = item.submitted_at ? new Date(item.submitted_at).toLocaleString('th-TH') : '';
            rows.push([
                i + 1,
                typeMap[item.report_type] || item.report_type || '',
                item.period || '',
                statusMap[item.status] || item.status || '',
                dt,
                item.reviewer_note || ''
            ]);
        });
        var csv = rows.map(function(r) {
            return r.map(function(c) { return '"' + String(c).replace(/"/g, '""') + '"'; }).join(',');
        }).join('\n');
        var bom = '\uFEFF';
        var blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'รายงาน_' + new Date().toISOString().slice(0, 10) + '.csv';
        a.click();
        URL.revokeObjectURL(url);
    }

    // === Load approvals ===
    async function loadApprovals() {
        var status = document.getElementById('filterStatus').value;
        var type = document.getElementById('filterType').value;
        var listEl = document.getElementById('reportList');
        listEl.innerHTML = '<div class="empty-state">⏳ กำลังโหลด...</div>';

        try {
            var params = {};
            if (status) params.status = status;
            if (type) params.reportType = type;
            var result = await callBackend('getReportApprovals', params);
            if (!result || !result.success) {
                listEl.innerHTML = '<div class="empty-state">เกิดข้อผิดพลาด</div>';
                return;
            }
            var items = result.data || [];
            _reportItems = items;
            document.getElementById('reportCount').textContent = items.length + ' รายการ';

            if (!items.length) {
                listEl.innerHTML = '<div class="empty-state">ไม่พบรายงาน</div>';
                return;
            }

            var html = '';
            items.forEach(function(item) {
                var typeMap = {
                    'water_monthly': '💧 ค่าน้ำรายเดือน',
                    'water_yearly': '💧 ค่าน้ำรายปี',
                    'electric_monthly': '⚡ ค่าไฟรายเดือน',
                    'electric_yearly': '⚡ ค่าไฟรายปี'
                };
                var typeLabel = typeMap[item.report_type] || item.report_type;
                var statusClass, statusLabel;
                if (item.status === 'approved') { statusClass = 'status-approved'; statusLabel = '✅ อนุมัติแล้ว'; }
                else if (item.status === 'rejected') { statusClass = 'status-rejected'; statusLabel = '❌ ไม่อนุมัติ'; }
                else { statusClass = 'status-pending'; statusLabel = '⏳ รอการอนุมัติ'; }
                var dt = item.submitted_at ? new Date(item.submitted_at).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '-';

                html += '<div class="report-card">';
                html += '<div class="report-card-header">';
                html += '<div class="report-card-info">';
                html += '<div class="report-card-title">' + typeLabel + '</div>';
                html += '<div class="report-card-meta">งวด ' + (item.period || '-') + ' • ส่งเมื่อ ' + dt + '</div>';
                html += '</div>';
                html += '<div style="display:flex;align-items:center;gap:.6rem;">';
                html += '<span class="status-badge ' + statusClass + '">' + statusLabel + '</span>';
                html += '<button class="btn btn-sm btn-primary" onclick="openReview(\'' + item.id + '\')">ดูรายงาน</button>';
                html += '</div>';
                html += '</div>';
                if (item.reviewer_note) html += '<div style="margin-top:.5rem;font-size:.9rem;color:var(--muted);">💬 ' + item.reviewer_note + '</div>';
                html += '</div>';
            });
            listEl.innerHTML = html;
        } catch (e) {
            listEl.innerHTML = '<div class="empty-state" style="color:var(--danger);">เกิดข้อผิดพลาด: ' + e.message + '</div>';
        }
    }

    // === Open review ===
    async function openReview(id) {
        currentReportId = id;
        var section = document.getElementById('reviewSection');
        section.style.display = 'block';
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });

        try {
            var result = await callBackend('getReportApprovalById', { id: id });
            if (!result || !result.success || !result.data) {
                alert('ไม่พบรายงาน');
                return;
            }
            var report = result.data;
            var typeMap = {
                'water_monthly': '💧 ค่าน้ำรายเดือน',
                'water_yearly': '💧 ค่าน้ำรายปี',
                'electric_monthly': '⚡ ค่าไฟรายเดือน',
                'electric_yearly': '⚡ ค่าไฟรายปี'
            };
            document.getElementById('reviewTitle').textContent = '📋 ' + (typeMap[report.report_type] || '') + ' — งวด ' + report.period;

            // Load preview in iframe
            var iframe = document.getElementById('previewFrame');
            iframe.srcdoc = report.report_html;

            // Show/hide signature panel based on status
            var sigPanel = document.getElementById('sigPanel');
            var btnApprove = document.getElementById('btnApprove');
            var btnReject = document.getElementById('btnReject');
            if (report.status === 'pending') {
                sigPanel.classList.add('active');
                btnApprove.style.display = '';
                btnReject.style.display = '';
                // Re-init canvases after panel is visible
                setTimeout(initSigCanvases, 100);
            } else {
                sigPanel.classList.remove('active');
            }
        } catch (e) {
            alert('เกิดข้อผิดพลาด: ' + e.message);
        }
    }

    function closeReview() {
        document.getElementById('reviewSection').style.display = 'none';
        currentReportId = null;
    }

    // === Approve ===
    async function approveReport() {
        if (!currentReportId) return;
        var sig1 = getSigData(1);
        var sig2 = getSigData(2);
        var sig3 = getSigData(3);
        if (!sig3) {
            alert('กรุณาลงนามหัวหน้างานก่อนอนุมัติ');
            return;
        }
        if (!confirm('ยืนยันอนุมัติรายงานนี้?')) return;
        try {
            var result = await callBackend('signReportApproval', {
                id: currentReportId,
                status: 'approved',
                sigRecorder: sig1,
                sigChecker: sig2,
                sigHead: sig3,
                reviewerNote: ''
            });
            if (result && result.success) {
                alert('✅ อนุมัติรายงานเรียบร้อยแล้ว');
                closeReview();
                loadApprovals();
            } else {
                alert('❌ เกิดข้อผิดพลาด: ' + (result && result.error ? result.error : 'ไม่ทราบสาเหตุ'));
            }
        } catch (e) {
            alert('❌ เกิดข้อผิดพลาด: ' + e.message);
        }
    }

    // === Reject ===
    var rejectMode = false;
    function toggleReject() {
        rejectMode = !rejectMode;
        var area = document.getElementById('rejectArea');
        var btn = document.getElementById('btnReject');
        if (rejectMode) {
            area.style.display = 'block';
            btn.textContent = '📤 ส่งไม่อนุมัติ';
            btn.onclick = submitReject;
        } else {
            area.style.display = 'none';
            btn.textContent = '❌ ไม่อนุมัติ';
            btn.onclick = toggleReject;
        }
    }

    async function submitReject() {
        if (!currentReportId) return;
        var note = document.getElementById('rejectNote').value.trim();
        if (!note) { alert('กรุณาระบุเหตุผลที่ไม่อนุมัติ'); return; }
        if (!confirm('ยืนยันไม่อนุมัติรายงานนี้?')) return;
        try {
            var result = await callBackend('signReportApproval', {
                id: currentReportId,
                status: 'rejected',
                reviewerNote: note
            });
            if (result && result.success) {
                alert('ส่งผลการตรวจสอบเรียบร้อยแล้ว');
                rejectMode = false;
                closeReview();
                loadApprovals();
            } else {
                alert('❌ เกิดข้อผิดพลาด: ' + (result && result.error ? result.error : 'ไม่ทราบสาเหตุ'));
            }
        } catch (e) {
            alert('❌ เกิดข้อผิดพลาด: ' + e.message);
        }
    }

    // Init
    async function doLogout() {
        if (typeof ppkLogout === 'function') { ppkLogout(); return; }
        localStorage.removeItem('sessionToken');
        localStorage.removeItem('currentUser');
        window.location.replace('login.html');
    }
    </script>

    <script>
    // Load approvals after auth check
    document.addEventListener('DOMContentLoaded', async function() {
        try {
            var user = await checkSession(true);
            if (!user || (user.role !== 'admin' && user.role !== 'head')) {
                if (typeof ppkAlert === 'function') ppkAlert('คุณไม่มีสิทธิ์เข้าถึงหน้านี้');
                window.location.replace('dashboard.html');
                return;
            }
            loadApprovals();
        } catch(e) {
            console.error('check-report init error', e);
        }
    });
    </script>
</body>
</html>
