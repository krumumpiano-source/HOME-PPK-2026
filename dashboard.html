                var slipStatus = a.slip_status || 'none';

                var amtHtml = amount > 0

                    : '�ѧ������ʹ����';
                var amtClass = amount > 0 ? 'phc-amount' : 'phc-amount zero';

                /* �� Bill breakdown �� */
                var wAmt = a.water_amount || 0;
                var eAmt = a.electric_amount || 0;
                var cAmt = a.common_fee || 0;
                var breakdownHtml = '';
                if (amount > 0 && (wAmt > 0 || eAmt > 0 || cAmt > 0)) {

                        + '</div>';

                /* �� Status badge �� */

                else if (slipStatus === 'reviewing') badgeHtml = '<div class="phc-status pending">?? �͵�Ǩ�ͺ</div>';
                else if (slipStatus === 'rejected')  badgeHtml = '<div class="phc-status rejected">? ��Ի�����ҹ</div>';
                else if (amount > 0)                 badgeHtml = '<div class="phc-status overdue">? �ͪ���</div>';

                /* �� Rejection banner �� */
                var rejectBannerHtml = '';
                if (slipStatus === 'rejected') {
                    rejectBannerHtml = '<div class="phc-reject-banner" style="display:block;">'
                        + '?? <strong>��Ի�١����ʸ</strong>'
                        + (reviewNote ? '<br>�˵ؼ�: <strong>' + reviewNote + '</strong>' : '')
                        + '<br>��سҵ�Ǩ�ͺ�ʹ��Թ���ǡ� <strong>"?? �����Ի����"</strong></div>';
                }

                /* �� CTA button �� */
                var ctaHtml = '';
                var cancelHtml = '';
                if (slipStatus === 'success') {
                    ctaHtml = '<button class="phc-cta success" disabled>? ��������������</button>';
                } else if (slipStatus === 'reviewing') {
                    ctaHtml = '<button class="phc-cta reviewing" disabled>?? ���������ҧ��Ǩ�ͺ</button>';
                    cancelHtml = '<button class="phc-cancel-btn" onclick="proxyCancelSlip(' + idx + ')">??? ¡��ԡ��Ի���������</button>';
                } else if (slipStatus === 'rejected') {
                    ctaHtml = '<button class="phc-cta" style="background:#FEE2E2;color:#DC2626;" onclick="proxyGoUpload(' + idx + ')">?? ��Ի�����ҹ � ���������</button>';
                    cancelHtml = '<button class="phc-cancel-btn" onclick="proxyCancelSlip(' + idx + ')">??? ¡��ԡ��Ի���������</button>';
                } else if (amount > 0) {
                    ctaHtml = '<button class="phc-cta" onclick="proxyGoUpload(' + idx + ')">?? �����Ի������Թ</button>';
                } else {
                    ctaHtml = '<button class="phc-cta reviewing" disabled>�ѧ������ʹ�������͹���</button>';
                }

                html += '<div class="proxy-hero-card">'
                    + '<div class="phc-label-proxy">?? ����᷹</div>'
                    + '<div class="phc-house">?? ' + houseLabel + '</div>'
                    + '<div class="phc-name">' + resName + '</div>'
                    + '<hr class="phc-divider">'
                    + '<div class="phc-row">'
                        + '<div class="phc-col">'
                            + '<div class="phc-amount-label">?? �ʹ�������͹���</div>'
                            + '<div class="' + amtClass + '">' + amtHtml + '</div>'
                            + breakdownHtml
                            + '<div class="phc-period">?? ' + periodDisplay + '</div>'
                        + '</div>'
                        + '<div class="phc-col" style="text-align:right;">' + badgeHtml + '</div>'
                    + '</div>'
                    + rejectBannerHtml
                    + ctaHtml
                    + cancelHtml
                    + '</div>';
            });

            sec.innerHTML = html;
        }

        function proxyGoUpload(idx) {
            var a = _proxyList[idx];
            if (!a) return;
            var periodKey = a.period ? a.period.replace('-', '') : '';
            var info = {
                unitNumber: a.house_number || '',
                proxyMode: true,
                period: a.period || '',
                periodKey: periodKey,
                notifiedAmount: a.amount > 0 ? a.amount : 0,
                residentName: a.resident_name || ''
            };
            localStorage.setItem('pendingSlipInfo', JSON.stringify(info));
            navigate('?page=upload-slip');
        }

        async function proxyCancelSlip(idx) {
            var a = _proxyList[idx];
            if (!a || !a.slip_id) { if (typeof ppkAlert === 'function') ppkAlert('��辺��������Ի'); return; }
            var ok = await ppkConfirm(
                '�׹�ѹ���¡��ԡ��Ի�ͧ��ҹ ' + (a.house_number || '') + '?\n\n��Ի�ж١ź�͡�ҡ�к�',
                { type: 'danger', okText: '¡��ԡ��Ի', cancelText: '���¡��ԡ' }
            );
            if (!ok) return;
            try {
                var result = await callBackend('cancelSlip', { id: a.slip_id });
                if (result && result.success) {
                    if (typeof ppkToast === 'function') ppkToast('¡��ԡ��Ի���º��������', 'success');
                    try {
                        var keys = [];
                        for (var i = 0; i < localStorage.length; i++) {
                            var k = localStorage.key(i);
                            if (k && k.indexOf('apicache_getDashboardData') === 0) keys.push(k);
                        }
                        keys.forEach(function(k) { localStorage.removeItem(k); });
                    } catch(e) {}
                    setTimeout(function() { loadDashboard(); }, 400);
                } else {
                    if (typeof ppkAlert === 'function') ppkAlert('?? ' + (result && result.error || '¡��ԡ���������'));
                }
            } catch(e) {
                if (typeof ppkAlert === 'function') ppkAlert('? ��Դ��ͼԴ��Ҵ: ' + e.message);
            }
        }

        function heroCtaClick() {
            var d = _ctaData;
            if (d.slipStatus === 'success' || d.slipStatus === 'reviewing') return;
            if (!d.houseNumber) {
                // �ѧ�������Ѻ�ͺ���º�ҹ�ѡ  ������蹤���ͧ
                window.location.href = 'request-form.html';
                return;
            }
            goToUploadSlip(d.periodKey, d.amount, false);
        }
        async function cancelSlipClick() {
            var d = _ctaData;
            if (!d.slipId) { if (typeof ppkAlert === 'function') ppkAlert('��辺��������Ի'); return; }
            var ok = await ppkConfirm('�׹�ѹ���¡��ԡ��Ի���������?\n\n��Ի�ж١ź�͡�ҡ�к� �س������ö�����Ի�������', { type: 'danger', okText: '¡��ԡ��Ի', cancelText: '���¡��ԡ' });
            if (!ok) return;
            try {
                var result = await callBackend('cancelSlip', { id: d.slipId });
                if (result && result.success) {
                    if (typeof ppkToast === 'function') ppkToast('¡��ԡ��Ի���º��������', 'success');
                    // ��ҧ cache �ء key ��������ǡѺ getDashboardData ���� reload
                    try {
                        var keys = [];
                        for (var i = 0; i < localStorage.length; i++) {
                            var k = localStorage.key(i);
                            if (k && k.indexOf('apicache_getDashboardData') === 0) keys.push(k);
                        }
                        keys.forEach(function(k) { localStorage.removeItem(k); });
                    } catch(e) {}
                    setTimeout(function() { loadDashboard(); }, 400);
                } else {
                    if (typeof ppkAlert === 'function') ppkAlert('?? ' + (result && result.error || '¡��ԡ���������'));
                }
            } catch(e) {
                if (typeof ppkAlert === 'function') ppkAlert('? ��Դ��ͼԴ��Ҵ: ' + e.message);
            }
        }

        function outstandingBtnClick() {
            var d = _ctaData;
            if (!d.houseNumber) {
                if (typeof ppkAlert === 'function') ppkAlert('��سҵ�駤�Һ�ҹ�ѡ��͹�����Ի');
                return;
            }
            goToUploadSlip(d.periodKey, d.outstanding, true);
        }

        function renderAdminDashboard(data) {
            document.getElementById('adminStatsSection').style.display = '';

            function _stat(id, count) {
                var el = document.getElementById(id);
                if (!el) return;
                el.textContent = String(count);
                el.className = 'ppk-stat-value ' + (count > 0 ? 'danger' : 'ok');
            }
            _stat('statPendingReg',   data.pendingRegistrations || 0);
            _stat('statPendingSlips', data.pendingSlips || 0);
            _stat('statPendingReqs',  data.pendingRequests || 0);

            // Collection rate
            var rateEl = document.getElementById('statCollectionRate');
            if (rateEl) {
                var rate = data.collectionRate;
                if (rate == null) { rateEl.textContent = '�'; rateEl.className = 'ppk-stat-value'; }
                else {
                    rateEl.textContent = rate + '%';
                    rateEl.className = 'ppk-stat-value ' + (rate >= 80 ? 'ok' : rate >= 50 ? 'warning' : 'danger');
                }
            }
            // Outstanding rooms
            var outEl = document.getElementById('statOutstandingRooms');
            if (outEl) {
                var out = data.outstandingRooms;
                if (out == null) { outEl.textContent = '�'; outEl.className = 'ppk-stat-value'; }
                else {
                    outEl.textContent = String(out);
                    outEl.className = 'ppk-stat-value ' + (out > 0 ? 'danger' : 'ok');
                }
            }
        }

        async function loadDashboard() {
            await checkSession(true);
            var user = {};
            try { user = JSON.parse(localStorage.getItem('currentUser') || '{}'); } catch(e) {}
            var isAdmin = user.role === 'admin' || user.role === 'head';
            var perms = user.permissions || [];
            var hasAnyPerm = isAdmin || perms.length > 0;

            buildQuickActions(isAdmin);
            buildHubGrid();
            // re-render nav ��ѧ checkSession ����������� permissions ����ش
            if (typeof renderPPKNav === 'function') renderPPKNav('ppkNav', 'dashboard');

            try {
                var result = await cachedCall('getDashboardData', {}, isAdmin ? 60000 : 15000);
                if (!result || !result.success) {
                    if (typeof ppkAlert === 'function') ppkAlert('��Ŵ��������������� ��س�����ê˹��');
                    return;
                }
                if (result._isStale && typeof ppkToast === 'function') ppkToast('�������Ҩ�����繻Ѩ�غѹ ��س�����ê', 'warning');
                renderAnnouncements(result.announcements || []);
                if (result.role === 'admin' || result.role === 'head') {
                    renderAdminDashboard(result.data || {});
                    if (result.residentData) { result.residentData.outstandingItems = result.outstandingItems; renderUserDashboard(result.residentData); }
                } else {
                    var _ud = result.data || {};
                    _ud.outstandingItems = result.outstandingItems;
                    renderUserDashboard(_ud);
                    renderProxyAssignments(result.proxyAssignments || []);
                }
            } catch(e) {
                console.warn('getDashboardData failed, fallback:', e);
                renderAnnouncements([]);
                if (isAdmin) { renderAdminDashboard({}); }
                else renderUserDashboard({});
            }
        }

        window._ppkNavPage = 'dashboard';
        if (typeof renderPPKNav === 'function') { renderPPKNav('ppkNav', 'dashboard'); }
        buildHubGrid();
        window.onload = async function() { await loadDashboard(); };

        function goToUploadSlip(periodKey, amount, isOutstanding) {
            var userData = JSON.parse(localStorage.getItem('currentUser') || '{}');
            var unitNumber = userData.houseNumber || '';
            var monthStr = periodKey.substring(4, 6);
            var yearBE = periodKey.substring(0, 4);
            var period = yearBE + '-' + monthStr;
            localStorage.setItem('pendingSlipInfo', JSON.stringify({
                unitNumber: unitNumber, periodKey: periodKey, period: period,
                notifiedAmount: amount, isOutstanding: !!isOutstanding
            }));
            navigate('?page=upload-slip');
        }

        // �����Ի�¡�Ǵ � ������������´��ҹ��/��/��ǹ��ҧŧ localStorage
        function goToUploadSlipDetail(period, total, water, elec, common, label) {
            var userData = JSON.parse(localStorage.getItem('currentUser') || '{}');
            var unitNumber = userData.houseNumber || '';
            var pts = period.split('-');
            var periodKey = (pts[0] || '') + (pts[1] || '');
            localStorage.setItem('pendingSlipInfo', JSON.stringify({
                unitNumber: unitNumber, periodKey: periodKey, period: period,
                notifiedAmount: total, isOutstanding: true,
                waterAmount: water, electricAmount: elec, commonFee: common,
                periodLabel: label
            }));
            navigate('?page=upload-slip');
        }

        async function doLogout() {
            if (typeof ppkLogout === 'function') { ppkLogout(); return; }
            localStorage.removeItem('sessionToken');
            localStorage.removeItem('currentUser');
            window.location.replace('login.html');
        }
