<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIFF History | HOME PPK 2026</title>
    <link rel="stylesheet" href="ppk-theme.css?v=20260312g">
    <style>
        body { margin: 0; font-family: 'Kanit', sans-serif; background: var(--c-bg, #F8FAFC); padding: 0.75rem; }
        .liff-container { max-width: 480px; margin: 0 auto; }
        .liff-card { background: var(--c-surface, #fff); border: 1px solid var(--c-border, #E5E7EB); border-radius: 14px; padding: 1.2rem; margin-bottom: 0.75rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .liff-header { text-align: center; margin-bottom: 1rem; }
        .liff-header h2 { margin: 0; color: var(--c-primary, #4F46E5); font-size: 1.15rem; }
        .liff-btn { background: linear-gradient(135deg, #4F46E5, #06B6D4); color: #fff; border: none; border-radius: 10px; padding: 0.7rem 1.2rem; font: inherit; font-size: 0.95rem; font-weight: 600; cursor: pointer; width: 100%; transition: all 0.15s; }
        .liff-btn:hover { box-shadow: 0 4px 16px rgba(79,70,229,0.3); }
        .form-group { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.6rem; }
        .form-group label { font-size: 0.85rem; color: #374151; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { padding: 0.6rem 0.8rem; border: 1.5px solid #E5E7EB; border-radius: 8px; font: inherit; font-size: 0.9rem; width: 100%; box-sizing: border-box; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #4F46E5; }
    </style>
</head>
<body>
  <div class="header">
    <h1>📋 ประวัติการชำระ</h1>
    <p id="houseLabel">-</p>
  </div>

  <div id="summaryBox" class="summary" style="display:none">
    <div class="summary-item"><p>ชำระแล้ว</p><span id="sumApproved">0</span></div>
    <div class="summary-item"><p>รอตรวจสอบ</p><span id="sumPending">0</span></div>
    <div class="summary-item"><p>รวมทั้งหมด</p><span id="sumTotal">฿0</span></div>
  </div>

  <div id="loadingSpinner" class="spinner"></div>
  <div id="historyList"></div>
  <a href="liff-dashboard.html"><button class="btn" style="display:none" id="backBtn">← กลับหน้าหลัก</button></a>

  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="supabase/config.js?v=20260312g"></script>
  <script src="supabase/supabase.min.js?v=20260312g"></script>
  <script src="ppk-api.js?v=20260312g"></script>
  <script>
    const MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

    function periodToThai(p) {
      if (!p) return '-';
      const [yr, mn] = p.split('-');
      return MONTHS[parseInt(mn)-1] + ' ' + (parseInt(yr)+543);
    }

    function statusBadge(s) {
      if (s === 'approved') return '<span class="badge badge-approved">✅ อนุมัติแล้ว</span>';
      if (s === 'rejected')  return '<span class="badge badge-rejected">❌ ไม่อนุมัติ</span>';
      return '<span class="badge badge-pending">⏳ รอตรวจสอบ</span>';
    }

    async function getLiffId() {
      return '2009333832-4En2TkWD';
    }

    async function init() {
      try {
        const liffId = await getLiffId();
        if (!liffId) throw new Error('no liff');
        await liff.init({ liffId });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        const res = await callBackend('getResidentByLine', { lineUserId: profile.userId });
        if (!res || !res.success || !res.resident) {
          document.getElementById('loadingSpinner').style.display = 'none';
          document.getElementById('historyList').innerHTML = '<div class="empty"><p>🔗</p><p>ยังไม่ได้เชื่อมบัญชี LINE<br><a href="liff-register.html">ลงทะเบียนก่อน</a></p></div>';
          return;
        }
        const house = res.resident.house_number;
        document.getElementById('houseLabel').textContent = 'บ้านพัก: ' + house;

        const hist = await callBackend('getPaymentHistory', { houseNumber: house });
        document.getElementById('loadingSpinner').style.display = 'none';
        document.getElementById('backBtn').style.display = 'block';

        if (!hist || !hist.success || !hist.data || hist.data.length === 0) {
          document.getElementById('historyList').innerHTML = '<div class="empty"><p>📄</p><p>ยังไม่มีประวัติการชำระ</p></div>';
          return;
        }

        let sumApproved = 0, sumPending = 0, totalBaht = 0;
        const html = hist.data.map(item => {
          const amount = parseFloat(item.amount_paid || 0);  // แก้: paid_amount → amount_paid (ตรง schema)
          totalBaht += amount;
          // payment_history ไม่มี status, ถือว่าทุกรายการที่อยู่ใน table นี้ได้รับการ approved แล้ว
          sumApproved++;
          const payDate = item.payment_date || item.recorded_at;
          return `<div class="entry">
            <div class="entry-left">
              <div class="entry-period">${periodToThai(item.period)}</div>
              <div class="entry-detail">${payDate ? new Date(payDate).toLocaleDateString('th-TH') : ''}</div>
              <span class="badge badge-approved">✅ ชำระแล้ว</span>
            </div>
            <div class="entry-amount">฿${amount.toLocaleString('th-TH')}</div>
          </div>`;
        }).join('');

        document.getElementById('historyList').innerHTML = html;
        document.getElementById('summaryBox').style.display = 'flex';
        document.getElementById('sumApproved').textContent = sumApproved;
        document.getElementById('sumPending').textContent = sumPending;
        document.getElementById('sumTotal').textContent = '฿' + totalBaht.toLocaleString('th-TH');
      } catch(e) {
        document.getElementById('loadingSpinner').style.display = 'none';
        document.getElementById('historyList').innerHTML = '<div class="empty"><p>❌</p><p>' + e.message + '</p></div>';
      }
    }
    init();
  </script>
</body>
</html>
