<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ประวัติการชำระ — บ้านพักครู</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Kanit',sans-serif;background:#f8fafc;min-height:100vh;padding:1rem}
    .header{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border-radius:16px;padding:1.25rem;text-align:center;margin-bottom:1rem}
    .header h1{font-size:1.25rem;font-weight:700}
    .header p{font-size:0.85rem;opacity:0.85;margin-top:0.25rem}
    .entry{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);padding:1rem 1.25rem;margin-bottom:0.85rem;display:flex;justify-content:space-between;align-items:center;gap:0.75rem}
    .entry-left{flex:1}
    .entry-period{font-size:0.92rem;font-weight:600;color:#1e293b}
    .entry-detail{font-size:0.82rem;color:#64748b;margin-top:0.2rem}
    .entry-amount{font-size:1.1rem;font-weight:700;color:#0f172a;white-space:nowrap}
    .badge{display:inline-block;padding:0.2rem 0.65rem;border-radius:999px;font-size:0.75rem;font-weight:600;margin-top:0.3rem}
    .badge-approved{background:#f0fdf4;color:#15803d}
    .badge-pending{background:#fef9c3;color:#a16207}
    .badge-rejected{background:#fef2f2;color:#dc2626}
    .empty{text-align:center;padding:3rem 1rem;color:#94a3b8}
    .empty p{font-size:1.5rem;margin-bottom:0.5rem}
    .spinner{width:40px;height:40px;border:4px solid #e5e7eb;border-top:4px solid #7c3aed;border-radius:50%;animation:spin 0.8s linear infinite;margin:2rem auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn{width:100%;padding:0.8rem;border:none;border-radius:10px;font-family:inherit;font-size:0.95rem;font-weight:600;cursor:pointer;background:#f1f5f9;color:#374151;margin-top:0.5rem}
    .summary{background:#fff;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;display:flex;justify-content:space-around;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
    .summary-item p{font-size:0.8rem;color:#64748b;margin-bottom:0.2rem}
    .summary-item span{font-size:1.1rem;font-weight:700;color:#0f172a}
  </style>
</head>
<body>
  <div class="header">
    <h1>📋 ประวัติการชำระ</h1>
    <p id="houseLabel">-</p>
  </div>

  <div id="summaryBox" class="summary" style="display:none">
    <div class="summary-item"><p>ชำระแล้ว</p><span id="sumApproved">0</span></div>
    <div class="summary-item"><p>รอตรวจสอบ</p><span id="sumPending">0</span></div>
    <div class="summary-item"><p>รวมทั้งหมด</p><span id="sumTotal">฿0</span></div>
  </div>

  <div id="loadingSpinner" class="spinner"></div>
  <div id="historyList"></div>
  <a href="liff-dashboard.html"><button class="btn" style="display:none" id="backBtn">← กลับหน้าหลัก</button></a>

  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="supabase/config.js"></script>
  <script src="supabase/supabase.min.js"></script>
  <script src="ppk-api.js?v=20260305"></script>
  <script>
    const MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

    function periodToThai(p) {
      if (!p) return '-';
      const [yr, mn] = p.split('-');
      return MONTHS[parseInt(mn)-1] + ' ' + (parseInt(yr)+543);
    }

    function statusBadge(s) {
      if (s === 'approved') return '<span class="badge badge-approved">✅ อนุมัติแล้ว</span>';
      if (s === 'rejected')  return '<span class="badge badge-rejected">❌ ไม่อนุมัติ</span>';
      return '<span class="badge badge-pending">⏳ รอตรวจสอบ</span>';
    }

    async function getLiffId() {
      return '2009333832-4En2TkWD';
    }

    async function init() {
      try {
        const liffId = await getLiffId();
        if (!liffId) throw new Error('no liff');
        await liff.init({ liffId });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        const res = await callBackend('getResidentByLine', { lineUserId: profile.userId });
        if (!res || !res.success || !res.resident) {
          document.getElementById('loadingSpinner').style.display = 'none';
          document.getElementById('historyList').innerHTML = '<div class="empty"><p>🔗</p><p>ยังไม่ได้เชื่อมบัญชี LINE<br><a href="liff-register.html">ลงทะเบียนก่อน</a></p></div>';
          return;
        }
        const house = res.resident.house_number;
        document.getElementById('houseLabel').textContent = 'บ้านพัก: ' + house;

        const hist = await callBackend('getPaymentHistory', { houseNumber: house });
        document.getElementById('loadingSpinner').style.display = 'none';
        document.getElementById('backBtn').style.display = 'block';

        if (!hist || !hist.success || !hist.data || hist.data.length === 0) {
          document.getElementById('historyList').innerHTML = '<div class="empty"><p>📄</p><p>ยังไม่มีประวัติการชำระ</p></div>';
          return;
        }

        let sumApproved = 0, sumPending = 0, totalBaht = 0;
        const html = hist.data.map(item => {
          const amount = parseFloat(item.amount_paid || 0);  // แก้: paid_amount → amount_paid (ตรง schema)
          totalBaht += amount;
          // payment_history ไม่มี status, ถือว่าทุกรายการที่อยู่ใน table นี้ได้รับการ approved แล้ว
          sumApproved++;
          const payDate = item.payment_date || item.recorded_at;
          return `<div class="entry">
            <div class="entry-left">
              <div class="entry-period">${periodToThai(item.period)}</div>
              <div class="entry-detail">${payDate ? new Date(payDate).toLocaleDateString('th-TH') : ''}</div>
              <span class="badge badge-approved">✅ ชำระแล้ว</span>
            </div>
            <div class="entry-amount">฿${amount.toLocaleString('th-TH')}</div>
          </div>`;
        }).join('');

        document.getElementById('historyList').innerHTML = html;
        document.getElementById('summaryBox').style.display = 'flex';
        document.getElementById('sumApproved').textContent = sumApproved;
        document.getElementById('sumPending').textContent = sumPending;
        document.getElementById('sumTotal').textContent = '฿' + totalBaht.toLocaleString('th-TH');
      } catch(e) {
        document.getElementById('loadingSpinner').style.display = 'none';
        document.getElementById('historyList').innerHTML = '<div class="empty"><p>❌</p><p>' + e.message + '</p></div>';
      }
    }
    init();
  </script>
</body>
</html>
