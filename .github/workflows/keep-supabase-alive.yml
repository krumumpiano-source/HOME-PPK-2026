name: Keep Supabase Alive

on:
  schedule:
    # ทุก 12 ชั่วโมง (UTC)
    - cron: '0 */12 * * *'
  workflow_dispatch:  # กดรันมือได้จาก GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://mwigdgxrfpcmfjuztmip.supabase.co
      SUPABASE_KEY: sb_publishable_DInAJWyKXTwcxC79jNiS9A_PDxjKWHL
    steps:
      - name: Ping Supabase services
        run: |
          set -euo pipefail

          check_endpoint() {
            local NAME="$1"
            local URL="$2"
            local HEADER_MODE="$3"

            if [ "$HEADER_MODE" = "with-key" ]; then
              STATUS=$(curl --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 25 -s -o /dev/null -w "%{http_code}" \
                "$URL" \
                -H "apikey: ${SUPABASE_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_KEY}")
            else
              STATUS=$(curl --retry 2 --retry-delay 2 --connect-timeout 10 --max-time 25 -s -o /dev/null -w "%{http_code}" \
                "$URL")
            fi

            echo "$NAME => HTTP $STATUS"

            if [ "$STATUS" = "555" ]; then
              echo "::error::$NAME reports PAUSED (HTTP 555) — กรุณา restore ที่ supabase.com/dashboard"
              exit 1
            fi

            case "$STATUS" in
              200|401|403|404|406)
                echo "✅ $NAME active"
                ;;
              *)
                echo "⚠️ $NAME unexpected status: $STATUS"
                ;;
            esac
          }

          check_endpoint "Auth Health" "${SUPABASE_URL}/auth/v1/health" "no-key"
          check_endpoint "REST API" "${SUPABASE_URL}/rest/v1/settings?select=key&limit=1" "with-key"
          check_endpoint "Storage API" "${SUPABASE_URL}/storage/v1/bucket" "with-key"
