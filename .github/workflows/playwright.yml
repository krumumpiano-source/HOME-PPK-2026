name: Playwright UI/UX Tests (Cross-Device)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: ${{ matrix.project }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: e2e                  # Desktop Chrome (baseline)
            browser: chromium
          - project: e2e-desktop-edge     # Microsoft Edge 1366×768
            browser: chromium
          - project: e2e-desktop-firefox  # Firefox
            browser: firefox
          - project: e2e-mobile-android   # Pixel 5 (Android)
            browser: chromium
          - project: e2e-mobile-samsung   # Samsung Galaxy A (360px)
            browser: chromium
          - project: e2e-mobile-ios       # iPhone 12 (WebKit)
            browser: webkit
          - project: e2e-tablet-ipad      # iPad gen 7 (WebKit)
            browser: webkit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.browser }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: Install Playwright browser system deps (from cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.browser }}

      - name: Create .env.test from secrets
        run: |
          cat <<EOF > .env.test
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          TEST_ADMIN_EMAIL=${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD=${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_USER_EMAIL=${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD=${{ secrets.TEST_USER_PASSWORD }}
          EOF

      - name: Create .auth directory
        run: mkdir -p .auth

      - name: Run auth setup
        id: auth_setup
        run: npx playwright test --project=auth-setup
        env:
          CI: 'true'
        continue-on-error: true

      - name: Create fallback storageState if auth failed
        if: steps.auth_setup.outcome == 'failure'
        run: |
          echo '{"cookies":[],"origins":[]}' > .auth/admin.json
          echo '{"cookies":[],"origins":[]}' > .auth/user.json
          echo "⚠️ Auth setup failed — running tests with empty storageState (public pages only)"

      - name: Run Playwright tests — ${{ matrix.project }}
        run: npx playwright test --project=${{ matrix.project }}
        env:
          CI: 'true'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (traces/screenshots/videos)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ matrix.project }}
          path: test-results/
          retention-days: 7

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright browser system deps (from cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Create .env.test from secrets
        run: |
          cat <<EOF > .env.test
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          TEST_ADMIN_EMAIL=${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD=${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_USER_EMAIL=${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD=${{ secrets.TEST_USER_PASSWORD }}
          EOF

      - name: Create .auth directory
        run: mkdir -p .auth

      - name: Run auth setup
        id: auth_setup
        run: npx playwright test --project=auth-setup
        env:
          CI: 'true'
        continue-on-error: true

      - name: Create fallback storageState if auth failed
        if: steps.auth_setup.outcome == 'failure'
        run: |
          echo '{"cookies":[],"origins":[]}' > .auth/admin.json
          echo '{"cookies":[],"origins":[]}' > .auth/user.json
          echo "⚠️ Auth setup failed — running integration tests with empty storageState"

      - name: Run Integration tests
        run: npx playwright test --project=integration
        env:
          CI: 'true'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-integration
          path: playwright-report/
          retention-days: 14
