    <style>
        :root {
            --bg:#f8fafc; --surface:#ffffff; --border:#e5e7eb;
            --text:#0f172a; --muted:#64748b; --primary:#2563eb;
            --success:#10b981; --warning:#f59e0b; --danger:#ef4444;
        }
        body { background:var(--bg); color:var(--text); font-family:'Kanit',sans-serif; margin:0; }
        .page-container { max-width:960px; margin:0 auto; padding:1rem; }
        .page-header { margin-bottom:1.5rem; }
        .page-header h2 { font-size:1.5rem; font-weight:700; margin:0 0 0.25rem; }
        .page-header p  { color:var(--muted); margin:0; font-size:0.9rem; }
        .tabs { display:flex; gap:0.5rem; margin-bottom:1.5rem; border-bottom:2px solid var(--border); padding-bottom:0.5rem; flex-wrap:wrap; }
        .tab-btn { background:none; border:none; padding:0.5rem 1.25rem; font-size:0.95rem; font-family:'Kanit',sans-serif; cursor:pointer; border-radius:8px 8px 0 0; color:var(--muted); }
        .tab-btn.active { background:var(--primary); color:#fff; font-weight:600; }
        .tab-panel { display:none; }
        .tab-panel.active { display:block; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.25rem; margin-bottom:0.75rem; }
        .form-group { margin-bottom:1rem; }
        .form-group label { display:block; font-size:0.85rem; font-weight:600; margin-bottom:0.4rem; }
        .form-group select, .form-group input, .form-group textarea {
            width:100%; padding:0.5rem 0.75rem; border:1.5px solid var(--border);
            border-radius:8px; font-family:'Kanit',sans-serif; font-size:0.9rem; box-sizing:border-box;
        }
        .status-badge { display:inline-block; padding:0.15rem 0.6rem; border-radius:99px; font-size:0.78rem; font-weight:700; }
        .badge-draft        { background:#f1f5f9; color:#475569; }
        .badge-pending_sign { background:#fef9c3; color:#854d0e; }
        .badge-signed       { background:#dcfce7; color:#166534; }
        .badge-archived     { background:#f1f5f9; color:#64748b; }
        .btn { padding:0.5rem 1.25rem; border:none; border-radius:8px; cursor:pointer; font-family:'Kanit',sans-serif; font-size:0.9rem; font-weight:600; }
        .btn-primary { background:var(--primary); color:#fff; }
        .btn-primary:disabled { background:#93c5fd; cursor:not-allowed; }
        .btn-sm { padding:0.25rem 0.75rem; font-size:0.82rem; }
        .btn-outline { background:#fff; border:1.5px solid var(--border); color:var(--text); }
        .btn-success { background:var(--success); color:#fff; }
        .empty-state { text-align:center; color:var(--muted); padding:3rem 1rem; }
        canvas { border:2px solid var(--border); border-radius:8px; display:block; touch-action:none; cursor:crosshair; }
        .sign-area { background:#fafafa; border:1.5px dashed var(--border); border-radius:10px; padding:1rem; text-align:center; }
    </style>
</head>

<div class="page-container">
    <button class="btn btn-outline btn-sm" onclick="history.back()" style="margin-bottom:1rem;">? ????</button>

<!-- Signature Modal -->
<div id="signModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;overflow-y:auto;padding:1rem;">
    <div style="background:#fff;border-radius:14px;max-width:520px;margin:2rem auto;padding:1.5rem;position:relative;">

<script>
var _allMous = [];
var _myMous  = [];
var _currentSignMouId = null;
var _currentSignRole  = null;
var _signCanvas = null;
var _signCtx    = null;
var _signing    = false;

window.onload = async function() {
    var user = await checkSession(true);
    window._currentUser = user;
    if (!user) { window.location.replace('login.html'); return; }
    initSidebar();
    _initSignCanvas();
    await loadPendingMous();
    if (user.role === 'admin' || user.role === 'head') {
        loadAllMous();
    }
    loadMyMous();
};

function _initSignCanvas() {
    _signCanvas = document.getElementById('signCanvas');
    _signCtx    = _signCanvas.getContext('2d');
    _signCtx.strokeStyle = '#1e293b';
    _signCtx.lineWidth = 2.5;
    _signCtx.lineCap = 'round';
    function _getPos(e) {
        var r = _signCanvas.getBoundingClientRect();
        var clientX = e.touches ? e.touches[0].clientX : e.clientX;
        var clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - r.left, y: clientY - r.top };
    }
    _signCanvas.addEventListener('mousedown', function(e) { _signing = true; var p = _getPos(e); _signCtx.beginPath(); _signCtx.moveTo(p.x, p.y); });
    _signCanvas.addEventListener('mousemove', function(e) { if (!_signing) return; var p = _getPos(e); _signCtx.lineTo(p.x, p.y); _signCtx.stroke(); });
    _signCanvas.addEventListener('mouseup',   function() { _signing = false; });
    _signCanvas.addEventListener('touchstart', function(e) { e.preventDefault(); _signing = true; var p = _getPos(e); _signCtx.beginPath(); _signCtx.moveTo(p.x, p.y); }, { passive: false });
    _signCanvas.addEventListener('touchmove',  function(e) { e.preventDefault(); if (!_signing) return; var p = _getPos(e); _signCtx.lineTo(p.x, p.y); _signCtx.stroke(); }, { passive: false });
    _signCanvas.addEventListener('touchend',   function() { _signing = false; });
}

function clearSignature() { _signCtx.clearRect(0, 0, _signCanvas.width, _signCanvas.height); }

async function loadPendingMous() {
    var r = await callBackend('getAllMous', { status: 'pending_sign' });
    var list = (r && r.mous) || [];
    var el = document.getElementById('pendingList');
    if (!list.length) { el.innerHTML = '<div class="empty-state">???????????????????</div>'; return; }
    el.innerHTML = list.map(function(m) { return renderMouCard(m, true); }).join('');
    // populate upload select
    var sel = document.getElementById('uploadMouId');
    sel.innerHTML = '<option value="">-- ?????????? --</option>';
    list.forEach(function(m) {
        var opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.id + ' — ' + (m.status || '');
        sel.appendChild(opt);
    });
}

async function loadAllMous() {
    var r = await callBackend('getAllMous', {});
    _allMous = (r && r.mous) || [];
    renderAllMous();
    // also update upload select
    var sel = document.getElementById('uploadMouId');
    sel.innerHTML = '<option value="">-- ?????????? --</option>';
    _allMous.forEach(function(m) {
        var opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.id + ' (' + (statusLabel(m.status)) + ')';
        sel.appendChild(opt);
    });
}

async function loadMyMous() {
    if (!window._currentUser) return;
    var r = await callBackend('getMousByResident', { residentId: window._currentUser.id });
    _myMous = (r && r.mous) || [];
    renderMyMous();
}

function renderAllMous() {
    var q  = (document.getElementById('mouSearch').value || '').toLowerCase();
    var st = document.getElementById('mouStatusFilter').value;
    var list = _allMous.filter(function(m) {
        if (st && m.status !== st) return false;
        if (q && m.id.toLowerCase().indexOf(q) < 0 && (m.resident_id || '').toLowerCase().indexOf(q) < 0) return false;
        return true;
    });
    var el = document.getElementById('allMouList');
    if (!list.length) { el.innerHTML = '<div class="empty-state">???????????</div>'; return; }
    el.innerHTML = list.map(function(m) { return renderMouCard(m, false); }).join('');
}

function renderMyMous() {
    var el = document.getElementById('myMouList');
    if (!_myMous.length) { el.innerHTML = '<div class="empty-state">????????????????</div>'; return; }
    el.innerHTML = _myMous.map(function(m) { return renderMouCard(m, m.status === 'pending_sign'); }).join('');
}

function statusLabel(s) { return { draft:'????', pending_sign:'??????', signed:'????????', archived:'????????' }[s] || s; }

function renderMouCard(m, showSign) {
    var stClass = 'badge-' + (m.status || 'draft');
    var stLabel = statusLabel(m.status);
    var resSign = m.sign_resident_url ? '?' : '?';
    var admSign = m.sign_admin_url    ? '?' : '?';
    var heaSign = m.sign_head_url     ? '?' : '?';
    var html = '<div class="card">' +
        '<div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">' +
        '<span class="status-badge ' + stClass + '">' + stLabel + '</span>' +
        '<code style="font-size:0.8rem;">' + _e(m.id) + '</code></div>' +
        '<div style="color:#6b7280;font-size:0.82rem;margin-top:0.35rem;">' +
        '???????: ' + _e(m.resident_id) + ' &nbsp;|&nbsp; ' +
        '????: ' + _e(m.house_id || '-') + ' &nbsp;|&nbsp; ' +
        '?? ' + formatDate(m.created_at) + '</div>' +
        '<div style="margin-top:0.5rem;font-size:0.85rem;">???????: ??????? ' + resSign + ' ?????? ' + admSign + ' ??????? ' + heaSign + '</div>';
    if (showSign) {
        html += '<div style="display:flex;gap:0.5rem;margin-top:0.75rem;flex-wrap:wrap;">';
        if (!m.sign_resident_url) html += '<button class="btn btn-primary btn-sm" onclick="openSignModal(\'' + m.id + '\',\'resident\',\'??????????????\')">?? ???? (???????)</button>';
        if (!m.sign_admin_url)    html += '<button class="btn btn-outline btn-sm" onclick="openSignModal(\'' + m.id + '\',\'admin\',\'?????????????\')">?? ???? (??????)</button>';
        if (!m.sign_head_url)     html += '<button class="btn btn-outline btn-sm" onclick="openSignModal(\'' + m.id + '\',\'head\',\'??????????????\')">?? ???? (???????)</button>';
        html += '</div>';
    }
    if (m.scanned_url) html += '<div style="margin-top:0.5rem;"><a href="' + _e(m.scanned_url) + '" target="_blank" class="btn btn-outline btn-sm">?? ????????????</a></div>';
    html += '</div>';
    return html;
}

function openSignModal(mouId, role, desc) {
    _currentSignMouId = mouId;
    _currentSignRole  = role;
    document.getElementById('signModalDesc').textContent = desc + ' — ' + mouId;
    clearSignature();
    document.getElementById('signModal').style.display = 'block';
}

async function submitSignature() {
    var imageData = _signCanvas.toDataURL('image/png');
    // Check canvas is not blank
    var blank = document.createElement('canvas');
    blank.width = _signCanvas.width; blank.height = _signCanvas.height;
    if (imageData === blank.toDataURL()) { ppkToast('??????????????????', 'warning'); return; }
    var btn = document.getElementById('submitSignBtn');
    btn.disabled = true; btn.textContent = '? ???????????...';
    var r = await callBackend('uploadMouSignature', { mouId: _currentSignMouId, role: _currentSignRole, signatureDataUrl: imageData });
    btn.disabled = false; btn.textContent = '?? ?????????????';
    if (r && r.success) {
        ppkToast('??????????????????????', 'success');
        document.getElementById('signModal').style.display = 'none';
        loadPendingMous(); loadAllMous(); loadMyMous();
    } else {
        ppkToast('??????????????: ' + ((r && r.error) || ''), 'error');
    }
}

async function uploadScanDoc() {
    var mouId = document.getElementById('uploadMouId').value;
    var file  = document.getElementById('uploadScanFile').files[0];
    if (!mouId) { ppkToast('???????????????', 'warning'); return; }
    if (!file)  { ppkToast('??????????????', 'warning'); return; }
    var btn = document.getElementById('uploadScanBtn');
    btn.disabled = true; btn.textContent = '? ????????????...';
    var r = await callBackend('uploadMouScan', { mouId: mouId, file: file });
    btn.disabled = false; btn.textContent = '?? ???????';
    if (r && r.success) {
        ppkToast('??????????????????????', 'success');
        document.getElementById('uploadScanFile').value = '';
        loadPendingMous(); loadAllMous();
    } else {
        ppkToast('??????????????: ' + ((r && r.error) || ''), 'error');
    }
}

function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById('tab-' + name).classList.add('active');
    if (btn) btn.classList.add('active');
    if (name === 'all')    loadAllMous();
    if (name === 'mine')   loadMyMous();
    if (name === 'pending') loadPendingMous();
}

function _e(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatDate(d) {
    if (!d) return '-';
    try { return new Date(d).toLocaleDateString('th-TH', { day:'2-digit', month:'short', year:'numeric' }); }
    catch(e) { return d; }
}
</script>
