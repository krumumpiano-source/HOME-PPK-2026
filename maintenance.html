<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ปิดปรับปรุงชั่วคราว | HOME PPK 2026</title>
    <link rel="stylesheet" href="ppk-theme.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1rem;
            color: #0f172a;
        }

        .maintenance-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #e5e7eb;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: bounce 2s infinite ease-in-out;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ef4444;
            margin: 0 0 1rem;
        }

        p {
            font-size: 1rem;
            color: #64748b;
            margin: 0 0 2rem;
            line-height: 1.6;
        }

        .btn-admin {
            display: inline-block;
            background: #f1f5f9;
            color: #64748b;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-family: 'Kanit', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-admin:hover {
            background: #e2e8f0;
            color: #0f172a;
        }
    </style>
</head>
<body>
    <div class="maintenance-card">
        <div class="icon">🛠️</div>
        <h1>ระบบกำลังปิดปรับปรุง</h1>
        <p>ขออภัยในความไม่สะดวก ขณะนี้ระบบบ้านพักครู (HOME PPK 2026) กำลังอยู่ในระหว่างการปรับปรุงและอัปเดตข้อมูล กรุณากลับมาใช้งานใหม่อีกครั้งในภายหลังครับ</p>
        <a href="login.html" class="btn-admin">เข้าสู่ระบบ (เฉพาะแอดมิน)</a>
    </div>
    <script>
        // ล้าง cache maintenance เมื่อมาถึงหน้านี้
        // เพื่อให้เมื่อกดไป login.html จะไม่ถูก redirect กลับมาจาก cache เก่า
        try {
            localStorage.removeItem('_isMaint');
            localStorage.removeItem('_maintCheckTs');
        } catch(e) {}
    </script>
</body>
</html>
