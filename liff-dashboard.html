<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ยอดค้างชำระ — บ้านพักครู LINE</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Kanit',sans-serif;background:#f8fafc;min-height:100vh;padding:1rem}
    .header{background:linear-gradient(135deg,#065f46,#10b981);color:#fff;border-radius:16px;padding:1.25rem;text-align:center;margin-bottom:1rem}
    .header h1{font-size:1.25rem;font-weight:700}
    .header p{font-size:0.85rem;opacity:0.85;margin-top:0.25rem}
    .avatar{width:52px;height:52px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);margin-bottom:0.5rem}
    .card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,0.07);padding:1.25rem;margin-bottom:1rem}
    .card-title{font-size:0.9rem;font-weight:600;color:#64748b;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.4rem}
    .amount{font-size:2rem;font-weight:700;color:#0f172a;text-align:center;margin:0.5rem 0}
    .amount.due{color:#dc2626}
    .amount.ok{color:#16a34a}
    .row{display:flex;justify-content:space-between;align-items:center;padding:0.4rem 0;border-bottom:1px solid #f1f5f9;font-size:0.9rem}
    .row:last-child{border-bottom:none}
    .row label{color:#64748b}
    .row span{font-weight:600;color:#0f172a}
    .badge{display:inline-block;padding:0.2rem 0.65rem;border-radius:999px;font-size:0.78rem;font-weight:600}
    .badge-pending{background:#fef9c3;color:#a16207}
    .badge-approved{background:#f0fdf4;color:#15803d}
    .badge-unpaid{background:#fef2f2;color:#dc2626}
    .btn{width:100%;padding:0.8rem;border:none;border-radius:10px;font-family:inherit;font-size:0.95rem;font-weight:600;cursor:pointer;margin-bottom:0.75rem;transition:all 0.2s}
    .btn-green{background:#06c755;color:#fff}
    .btn-blue{background:#0a84ff;color:#fff}
    .btn-gray{background:#f1f5f9;color:#374151}
    .loading{text-align:center;padding:2rem;color:#94a3b8}
    .spinner{width:40px;height:40px;border:4px solid #e5e7eb;border-top:4px solid #10b981;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    .no-link{text-align:center;padding:2rem 1rem}
    .no-link p{color:#64748b;font-size:0.9rem;line-height:1.8}
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="loadingView" class="loading">
    <div class="spinner"></div>
    กำลังโหลดข้อมูล...
  </div>

  <!-- Not Linked -->
  <div id="noLinkView" style="display:none" class="card">
    <div class="no-link">
      <p style="font-size:2rem">🔗</p>
      <p>ยังไม่ได้เชื่อมบัญชี LINE<br>กรุณาลงทะเบียนก่อนเพื่อดูข้อมูลบ้านพักของคุณ</p>
      <button class="btn btn-green" style="margin-top:1rem" onclick="goRegister()">➡ ลงทะเบียน/เชื่อม LINE</button>
    </div>
  </div>

  <!-- Main Dashboard -->
  <div id="mainView" style="display:none">
    <div class="header">
      <img id="userAvatar" class="avatar" onerror="this.style.display='none'" alt="">
      <h1 id="userName">สวัสดี!</h1>
      <p id="houseInfo">บ้านพัก —</p>
    </div>

    <!-- ยอดเดือนปัจจุบัน -->
    <div class="card">
      <div class="card-title">💰 ยอดค้างชำระเดือนนี้</div>
      <div class="amount due" id="totalDue">฿0</div>
      <div class="row"><label>ค่าน้ำ</label><span id="waterAmt">-</span></div>
      <div class="row"><label>ค่าไฟ</label><span id="elecAmt">-</span></div>
      <div class="row"><label>ค่าส่วนกลาง</label><span id="commonAmt">-</span></div>
      <div class="row"><label>สถานะ</label><span id="payStatus"><span class="badge badge-unpaid">ยังไม่ชำระ</span></span></div>
    </div>

    <!-- Actions -->
    <a id="slipLink" href="liff-slip.html"><button class="btn btn-green">📤 ส่งสลิปการชำระ</button></a>
    <a href="liff-history.html"><button class="btn btn-blue">📋 ประวัติการชำระ</button></a>
    <a href="liff-forms.html"><button class="btn btn-gray">📝 แบบฟอร์มต่างๆ</button></a>
  </div>

  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="supabase/config.js?v=20260309"></script>
  <script src="supabase/supabase.min.js?v=20260309"></script>
  <script src="ppk-api.js?v=20260305"></script>
  <script>
    let _lineUserId = '';

    async function getLiffId() {
      return '2009333832-4En2TkWD';
    }

    function fmt(n) { return n ? parseInt(n).toLocaleString('th-TH') : '0'; }

    async function init() {
      try {
        const liffId = await getLiffId();
        if (!liffId) throw new Error('no liff id');
        await liff.init({ liffId });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        _lineUserId = profile.userId;
        document.getElementById('userAvatar').src = profile.pictureUrl || '';
        document.getElementById('userName').textContent = 'สวัสดี คุณ' + (profile.displayName || '');

        // ดึงข้อมูลผู้พักอาศัย
        const r = await callBackend('getResidentByLine', { lineUserId: _lineUserId });
        if (!r || !r.success || !r.resident) {
          show('noLinkView'); return;
        }
        const res = r.resident;
        document.getElementById('houseInfo').textContent = 'บ้านพัก: ' + (res.house_number || '-');

        // ดึงยอดค้าง
        const today = new Date();
        const yr = today.getFullYear();
        const mn = String(today.getMonth() + 1).padStart(2, '0');
        const bil = await callBackend('getBillForHouse', { houseNumber: res.house_number, period: yr + '-' + mn });
        if (bil && bil.success && bil.data) {
          const d = bil.data;
          document.getElementById('waterAmt').textContent  = fmt(d.waterBill) + ' บาท';
          document.getElementById('elecAmt').textContent   = fmt(d.electricBill) + ' บาท';
          document.getElementById('commonAmt').textContent = fmt(d.commonFee) + ' บาท';
          const total = (d.waterBill||0) + (d.electricBill||0) + (d.commonFee||0);
          document.getElementById('totalDue').textContent  = '฿' + total.toLocaleString('th-TH');
          const statusEl = document.getElementById('payStatus');
          if (d.paymentStatus === 'approved') {
            statusEl.innerHTML = '<span class="badge badge-approved">ชำระแล้ว ✅</span>';
            document.getElementById('totalDue').className = 'amount ok';
          } else if (d.paymentStatus === 'pending') {
            statusEl.innerHTML = '<span class="badge badge-pending">รอตรวจสอบ ⏳</span>';
          }
        }
        show('mainView');
      } catch(e) {
        show('noLinkView');
      }
    }

    function show(id) {
      ['loadingView','noLinkView','mainView'].forEach(v => document.getElementById(v).style.display = v===id ? 'block' : 'none');
    }

    function goRegister() { window.location.href = 'liff-register.html'; }

    init();
  </script>
</body>
</html>
