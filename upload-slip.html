    <script>

        // ============ Helpers ============
        const urlParams = new URLSearchParams(window.location.search);

        // ???????????????????? dashboard (???? pendingSlipInfo)
        const _pendingSlip = JSON.parse(localStorage.getItem('pendingSlipInfo') || 'null');
        if (_pendingSlip) localStorage.removeItem('pendingSlipInfo');

        var unitNumber = urlParams.get('unit')
            || (_pendingSlip && _pendingSlip.unitNumber)
            || localStorage.getItem('currentUserUnit') || '';
        const periodKey = urlParams.get('period')
            || (_pendingSlip && _pendingSlip.periodKey)
            || getCurrentPeriodKey();

        const THAI_MONTHS = [
            '??????','??????????','??????','??????','???????','????????',
            '???????','???????','???????','??????','?????????','???????'
        ];

        function getCurrentPeriodKey(){
            const now = new Date();
            const yearBE = now.getFullYear() + 543;
            const month = String(now.getMonth() + 1).padStart(2, '0');
            return yearBE + month;
        }

        // ???? key 256902 ? 2569-02
        function toApiPeriod(key){
            if (!key || key.length < 6) return key;
            if (key.includes('-')) return key;
            return key.substring(0, 4) + '-' + key.substring(4, 6);
        }

        function formatPeriod(key){
            if(!key || key.length < 6) return '-';
            const year = key.substring(0, 4);
            const monthIdx = parseInt(key.substring(4, 6)) - 1;
            return THAI_MONTHS[monthIdx] + ' ' + year;
        }

        function formatMoney(v){
            const n = Number(v);
            return Number.isFinite(n) ? n.toLocaleString('th-TH') : '0';
        }

        // ============ ?????????? (max 1200px, quality 0.7) ============
        function resizeImage(file, maxWidth = 1200, quality = 0.7){
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(e){
                    const img = new Image();
                    img.onload = function(){
                        let w = img.width, h = img.height;
                        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // ============ ?????????????????? ============
        async function loadBillingInfo(){
            document.getElementById('display-unit').textContent = unitNumber || '-';
            document.getElementById('display-period').textContent = formatPeriod(periodKey);

            let totalAmount = 0;
            let residentName = '';

            // ???????? dashboard ???? pendingSlipInfo — ???????????????????? (????????)
            if (_pendingSlip && _pendingSlip.notifiedAmount > 0) {
                totalAmount = _pendingSlip.notifiedAmount;
                residentName = _pendingSlip.residentName || '';
                document.getElementById('display-amount').textContent = formatMoney(totalAmount) + ' ???';
                document.getElementById('paid-amount').value = totalAmount;
                window.billingInfo = {
                    unitNumber: unitNumber,
                    periodKey: periodKey,
                    period: _pendingSlip.period || toApiPeriod(periodKey),
                    notifiedAmount: totalAmount,
                    residentName: residentName
                };
                return; // ???????????? backend ????????????????????
            }

            // ?????? Backend ????
            try {
                    const period = toApiPeriod(periodKey);
                    const result = await cachedCall('getBillSummaryAll', { period }, 300000);
                    if (result && result.success && result.data) {
                        const row = result.data.find(r => String(r.house_number) === String(unitNumber));
                        if (row) {
                            totalAmount = (parseFloat(row.water_amount) || 0) + (parseFloat(row.electric_amount) || 0) + (parseFloat(row.common_fee) || 0);
                            residentName = row.resident_name || '';
                        }
                    }
                } catch (e) { console.error('getBillSummaryAll error:', e); }

            // ??? Backend ??????????? ? ???????????????????? localStorage ????????????????????
            if (totalAmount === 0) {
                document.getElementById('display-amount').textContent = '?????????????????????????';
                document.getElementById('paid-amount').value = '';
                window.billingInfo = {
                    unitNumber: unitNumber,
                    periodKey: periodKey,
                    period: toApiPeriod(periodKey),
                    notifiedAmount: 0,
                    residentName: residentName
                };
                return;
            }

            document.getElementById('display-amount').textContent = formatMoney(totalAmount) + ' ???';
            document.getElementById('paid-amount').value = totalAmount;

            window.billingInfo = {
                unitNumber: unitNumber,
                periodKey: periodKey,
                period: toApiPeriod(periodKey),
                notifiedAmount: totalAmount,
                residentName: residentName
            };
        }

        // ============ Preview ============
        document.getElementById('slip').addEventListener('change', function(e){
            const previewContainer = document.getElementById('preview-container');
            previewContainer.innerHTML = '';
            const files = Array.from(e.target.files).slice(0, 3); // ????? 3 ???
            files.forEach((file) => {
                const reader = new FileReader();
                reader.onload = function(event){
                    const img = document.createElement('img');
                    img.src = event.target.result;
                    img.style.cssText = 'width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid #4f8cff;';
                    previewContainer.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        });

        // ============ Submit ============
        document.getElementById('slipForm').addEventListener('submit', async function(e){
            e.preventDefault();

            const paidAmount = parseFloat(document.getElementById('paid-amount').value) || 0;
            const fileInput = document.getElementById('slip');
            const files = Array.from(fileInput.files).slice(0, 3);

            if(files.length === 0){ ppkAlert('???????????????????????? 1 ???'); return; }
            if(paidAmount <= 0){ ppkAlert('?????????????????????????'); return; }

            const submitBtn = document.querySelector('.submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = '????????...';

            try {
                // ????????????????
                const resizedImages = [];
                for (const file of files) {
                    const resized = await resizeImage(file);
                    resizedImages.push(resized);
                }

                // ????? Supabase
                const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
                const submitEmail = isAdmin
                    ? (document.getElementById('admin-email-input').value.trim() || user.email || '')
                    : (user.email || '');

                try {
                    // ??????????????????? Supabase Storage ????
                    const slipUrls = [];
                    if (window._sb && resizedImages.length > 0) {
                        submitBtn.textContent = '???????????????...';
                        for (let i = 0; i < resizedImages.length; i++) {
                            try {
                                const b64 = resizedImages[i].split(',')[1];
                                const binary = atob(b64);
                                const bytes = new Uint8Array(binary.length);
                                for (let j = 0; j < binary.length; j++) bytes[j] = binary.charCodeAt(j);
                                const blob = new Blob([bytes], { type: 'image/jpeg' });
                                const ts = Date.now() + i;
                                const path = `slips/${window.billingInfo.unitNumber}_${window.billingInfo.period}_${ts}.jpg`;
                                const { data: upData, error: upErr } = await window._sb.storage
                                    .from('slips').upload(path, blob, { contentType: 'image/jpeg', upsert: true });
                                if (!upErr) {
                                    const { data: urlData } = window._sb.storage.from('slips').getPublicUrl(path);
                                    slipUrls.push(urlData.publicUrl);
                                } else {
                                    console.warn('Upload slip image failed:', upErr.message);
                                }
                            } catch (upEx) { console.warn('Upload slip exception:', upEx); }
                        }
                    }
                    submitBtn.textContent = '???????????...';
                    const submitResult = await callBackend('submitSlip', {
                        houseNumber: window.billingInfo.unitNumber,
                        residentId:  user.residentId || null,
                        period:      window.billingInfo.period,
                        amount:      paidAmount,
                        slipUrl:     slipUrls.length > 0 ? JSON.stringify(slipUrls) : null
                    });
                    if (submitResult && submitResult.success) {
                        ppkAlert('? ????????????????????!\n\n???????????????????????????????');
                        window.navigate('dashboard.html');
                        return;
                    }
                } catch (submitErr) {
                    console.warn('Supabase submitSlip failed, using localStorage:', submitErr);
                }

                // Fallback: ???????? localStorage
                const slipData = {
                    unitNumber: window.billingInfo.unitNumber,
                    name: window.billingInfo.residentName,
                    periodKey: window.billingInfo.periodKey,
                    notifiedAmount: window.billingInfo.notifiedAmount,
                    paidAmount: paidAmount,
                    slipImages: resizedImages,
                    submittedAt: new Date().toISOString(),
                    status: 'pending'
                };

                const key = 'slipSubmissions_' + window.billingInfo.periodKey;
                const submissions = JSON.parse(localStorage.getItem(key) || '[]');
                const existingIndex = submissions.findIndex(s => s.unitNumber === slipData.unitNumber);
                if (existingIndex !== -1) {
                    if (!await ppkConfirm('????????????????? ??????????????????????')) {
                        submitBtn.disabled = false;
                        submitBtn.textContent = '????????????????';
                        return;
                    }
                    submissions[existingIndex] = slipData;
                } else {
                    submissions.push(slipData);
                }
                localStorage.setItem(key, JSON.stringify(submissions));

                ppkAlert('? ????????????????????!\n\n???????????????????????????????');
                window.navigate('?page=dashboard');

            } catch (err) {
                ppkAlert('??????????????: ' + err.message);
                submitBtn.disabled = false;
                submitBtn.textContent = '????????????????';
            }
        });

        // ============ Admin Override Helpers ============
        var isAdmin = false;

        async function initAdminOverride(user) {
            if (user.role !== 'admin') return;
            isAdmin = true;
            document.getElementById('admin-override-panel').style.display = 'block';

            // ??????????????/???????????
            let houses = JSON.parse(localStorage.getItem('housingData') || '[]');
            if (houses.length === 0) {
                try {
                    const r = await cachedCall('getHousingList', {}, 600000);
                    if (r && r.success) houses = r.data || [];
                } catch(e) {}
            }
            // ???????????
            houses.sort((a, b) => {
                const typeA = (a.display_number||'').startsWith('????') ? 0 : 1;
                const typeB = (b.display_number||'').startsWith('????') ? 0 : 1;
                if (typeA !== typeB) return typeA - typeB;
                return parseInt((a.display_number||'').match(/\d+/)||[0]) - parseInt((b.display_number||'').match(/\d+/)||[0]);
            });
            const sel = document.getElementById('admin-house-select');
            houses.forEach(h => {
                const dn = h.display_number || '';
                if (!dn) return;
                const opt = document.createElement('option');
                opt.value = dn;
                opt.textContent = dn + (h.status === 'occupied' ? ' (????????)' : ' (????)');
                // ??? unitNumber ??????????????? ? pre-select
                if (unitNumber && dn === unitNumber) opt.selected = true;
                sel.appendChild(opt);
            });

            // ??? pre-fill ???? email admin — ??????????????? admin ??????????? auto-fill ?????????
            document.getElementById('admin-email-input').value = '';
            document.getElementById('admin-email-input').placeholder = '???????????????????? (????????? ?????? admin)';

            // ??????????????????? (??? URL param) ? auto-fill email ?????????????????
            if (unitNumber) await fillResidentEmail(unitNumber);
        }

        async function fillResidentEmail(houseNumber) {
            // ???????? email ?????????????????????? residents
            let residents = JSON.parse(localStorage.getItem('residentsData') || '[]');
            if (residents.length === 0) {
                try {
                    const r = await cachedCall('getResidentsList', {}, 600000);
                    if (r && r.success) residents = r.data || [];
                } catch(e) {}
            }
            const found = residents.find(r => r.house_number === houseNumber && r.resident_type !== 'cohabitant');
            if (found && found.email) {
                document.getElementById('admin-email-input').value = found.email;
            }
        }

        async function onAdminHouseChange() {
            const sel = document.getElementById('admin-house-select');
            const selected = sel.value;
            if (!selected) return;
            unitNumber = selected;
            document.getElementById('display-unit').textContent = unitNumber;
            await fillResidentEmail(unitNumber);
            await loadBillingInfo();
        }

        // ???????????????????????
        window.onload = async function(){
            const user = await checkSession();
            // ?????? unitNumber ??? user ??????????
            if (!unitNumber) {
                unitNumber = (user.resident && user.resident.house_number)
                    ? user.resident.house_number
                    : (user.house_number || '');
            }
            // Admin mode
            await initAdminOverride(user);
            await loadBillingInfo();
        };
