<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HOME PPK">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>ลืมอีเมล | HOME PPK 2026</title>
    <link rel="stylesheet" href="ppk-theme.css?v=20260312L">
    <style>
        body {
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #312E81 0%, #4F46E5 50%, #06B6D4 100%);
            font-family: 'Kanit', sans-serif; padding: 1rem;
        }
        .login-container {
            background: rgba(255,255,255,0.97); border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25); padding: 2rem 1.8rem;
            max-width: 390px; width: 100%; display: flex; flex-direction: column; gap: 1rem;
            animation: ppk-fadein 0.4s ease-out;
        }
        .login-container h2 { margin: 0; color: #4F46E5; font-weight: 700; text-align: center; font-size: 1.2rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
        .form-group label { font-size: 0.9rem; color: #374151; font-weight: 500; }
        .form-group input {
            padding: 0.7rem 1rem; border: 1.5px solid #E5E7EB; border-radius: 10px;
            font: inherit; font-size: 0.95rem; width: 100%; box-sizing: border-box;
        }
        .form-group input:focus { outline: none; border-color: #4F46E5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        .error-message { color: #DC2626; font-size: 0.88rem; text-align: center; display: none; }
        .login-btn {
            background: linear-gradient(135deg, #4F46E5, #06B6D4); color: #fff;
            border: none; border-radius: 10px; padding: 0.8rem;
            font: inherit; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
        }
        .login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,70,229,0.35); }
        .menu-links { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.3rem; }
        .menu-links a { color: #4F46E5; text-decoration: none; font-size: 0.92rem; text-align: center; }
        .menu-links a:hover { color: #06B6D4; }
        @media (max-width: 480px) { .login-container { padding: 1.2rem 0.8rem; max-width: 98vw; } }
        @keyframes ppk-fadein { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <form class="login-container" id="forgotEmailForm" autocomplete="on" onsubmit="return validateForgotEmail();">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
            <div>
                <div style="font-size:1.15rem; font-weight:700; color:#4F46E5;">HOME PPK 2026</div>
                <div style="font-size:0.98rem; color:#555;">โปรแกรมบริหารจัดการ งานส่งเสริม กำกับ ดูแล และพัฒนาบ้านพักครู โรงเรียนพะเยาพิทยาคม</div>
            </div>
        </div>
        <h2 id="forgotEmailTitle">ลืมอีเมล</h2>
        <div class="form-group">
            <label for="phone" id="phoneLabel">กรอกเบอร์โทรศัพท์ที่ใช้สมัคร</label>
            <input type="tel" id="phone" name="phone" required placeholder="กรอกเบอร์โทรศัพท์" pattern="[0-9]{9,15}" style="font-size:1.15rem; padding:1rem 1.2rem;" maxlength="15" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'');">
        </div>
        <div class="error-message" id="errorMsg"></div>
        <button type="submit" class="login-btn" id="forgotEmailBtn">ขออีเมลที่ใช้สมัคร</button>
        <div class="menu-links">
            <a href="#" onclick="navigate('?page=login');return false;" id="backToLogin">กลับสู่หน้าเข้าสู่ระบบ</a>
        </div>
        <div style="text-align:center; margin-top:1.2rem; font-size:0.95rem; color:#888;" id="footerCredit">
            ออกแบบและพัฒนาโดย ครูพงศธร โพธิแก้ว
            <br>งานส่งเสริม กำกับ ดูแล และพัฒนาบ้านพักครู โรงเรียนพะเยาพิทยาคม
        </div>
    </form>
    <script>

        // ============ Form Validation ============
        function validateForgotEmail() {
            const phone = document.getElementById('phone').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.style.display = 'none';
            errorMsg.textContent = '';
            if (!/^\d{9,15}$/.test(phone)) {
                errorMsg.textContent = 'กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง (9-15 หลัก)';
                errorMsg.style.display = 'block';
                return false;
            }
            // Validation passed → call backend
            handleFindEmail();
            return false; // prevent form submission
        }

        // ============ Find Email Handler ============
        async function handleFindEmail() {
            const phone = document.getElementById('phone').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const forgotEmailBtn = document.getElementById('forgotEmailBtn');

            forgotEmailBtn.disabled = true;
            forgotEmailBtn.textContent = 'กำลังค้นหา...';
            errorMsg.style.display = 'none';

            try {
                const result = await callBackend('findEmail', { phone });

                if (result.success) {
                    // แสดงอีเมลที่ปกปิดบางส่วน
                    document.getElementById('forgotEmailForm').innerHTML = `
                        <div style="text-align:center; padding:2rem 1rem;">
                            <div style="font-size:3rem; margin-bottom:1rem;">📧</div>
                            <h2 style="color:#10b981; margin-bottom:1rem;">พบอีเมลที่เชื่อมกับเบอร์นี้!</h2>
                            <p style="color:#555; font-size:1.05rem; margin-bottom:0.5rem;">
                                ${result.message || 'อีเมลที่ใช้สมัครคือ'}
                            </p>
                            <p style="font-size:1.5rem; font-weight:700; color:#4F46E5; margin-bottom:1.5rem; letter-spacing:1px;">
                                ${result.email || ''}
                            </p>
                            <a href="#" onclick="navigate('?page=login');return false;" style="display:inline-block; padding:0.8rem 2rem; background:linear-gradient(90deg,#4F46E5,#06B6D4); color:#fff; border-radius:8px; text-decoration:none; font-weight:700;">กลับสู่หน้าเข้าสู่ระบบ</a>
                        </div>
                    `;
                } else {
                    errorMsg.textContent = result.error || 'ไม่พบอีเมลที่เชื่อมกับเบอร์โทรนี้';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = err.message || 'ไม่สามารถเชื่อมต่อระบบได้';
                errorMsg.style.display = 'block';
            } finally {
                forgotEmailBtn.disabled = false;
                forgotEmailBtn.textContent = 'ขออีเมลที่ใช้สมัคร';
            }
        }
    </script>
    <script src="supabase/config.js?v=20260312L"></script>
    <script src="supabase/supabase.min.js?v=20260312L"></script>
    <script src="ppk-api.js?v=20260312L"></script>
    <script src="ppk-app.js?v=20260312L"></script>
    <script src="ppk-utils.js?v=20260312L"></script>
    <script src="ppk-pwa.js?v=20260312L"></script>
</body>
</html>
